# Works with both `docker compose up` (local) and `docker stack deploy` (Swarm).
#
# IMPORTANT (scaling): this backend stores all state in SQLite files on a volume.
# SQLite is single-writer and cannot be safely shared across hosts, so the
# service runs as a SINGLE replica pinned (via the placement constraint) to one
# node, where WAL mode lets the async workers read/write concurrently. To run
# more than one replica you must (a) keep them on the same node sharing a local
# volume, and (b) set RUN_DB_SYNC=true on exactly one of them + a shared
# PROXY_SECRET on all. True horizontal (multi-node) scaling needs a networked
# DB instead of SQLite — see the README "Deploying to Docker Swarm" section.

services:
  anime-api:
    image: crimson-backend:1.0
    ports:
      - "8000:8000"
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY:?set TMDB_API_KEY in the environment or an .env file}
      # Mapping DB + accounts DB live on the persisted volume so user data and
      # the synced mapping survive redeploys.
      - MAPPING_DB=/app/data/anime_mappings.db
      - ACCOUNTS_DB=/app/data/accounts.db
      #IMPORTANT: The db must be owned by 1001:1001.
      # sudo mkdir -p /db/data
      # sudo chown -R 10001:10001 /db/data
      # sudo chown 10001:10001 /db/anime_mappings.db
      # Stable, shared secret for the signed stream proxies (PlayIMDb/AnimeSuge).
      # MUST be set (and identical on every replica) or proxied playback 403s
      # across restarts/replicas. Generate one: `openssl rand -hex 32`.
      - PROXY_SECRET=${PROXY_SECRET:?set PROXY_SECRET (e.g. openssl rand -hex 32)}
      # Only one replica should own the periodic Fribb resync.
      - RUN_DB_SYNC=true
      # Optional: comma-separated CORS origins (defaults to the built-in list).
      # - ALLOWED_ORIGINS=https://crimsonhaven.to,https://www.crimsonhaven.to
      # Optional Jellyfin source (see .env.example).
      # - JELLYFIN_URL=
      # - JELLYFIN_USERNAME=
      # - JELLYFIN_PASSWORD=

    volumes:
      - crimson-data:/app/data   # mapping DB + accounts DB (named volume)

    # Container-level health is also defined in the Dockerfile; declared here too
    # so `docker compose` reports it without relying on the image default.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

    # Honoured by plain `docker compose`; Swarm uses deploy.restart_policy below.
    restart: unless-stopped

    deploy:
      replicas: 1
      placement:
        # Pin to one node so the SQLite volume is never split across hosts.
        # Replace with a real constraint, e.g. `- node.labels.crimson == true`.
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      update_config:
        order: stop-first   # single-writer DB: never run old+new together
        parallelism: 1
      resources:
        limits:
          cpus: "1.50"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  crimson-data:
