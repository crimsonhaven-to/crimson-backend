# Works with `docker compose up` (local / dev). For a real Swarm production
# deploy you'll likely point DATABASE_URL at a managed/external PostgreSQL
# instead of the bundled `postgres` service below — but for dev-testing a second
# container is the simplest thing that works.
#
# State now lives in PostgreSQL (mapping tables + account/user data, one DB), so
# the API is stateless and can be scaled to multiple replicas pointing at the
# same database — the SQLite single-writer/shared-volume limitation is gone.
# Keep RUN_DB_SYNC=true on exactly ONE replica (the Fribb resync rebuilds the
# mapping tables wholesale; running it everywhere just wastes bandwidth) and a
# shared PROXY_SECRET on all.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-crimson}
      - POSTGRES_USER=${POSTGRES_USER:-crimson}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-crimson}
    volumes:
      - crimson-pgdata:/var/lib/postgresql/data
    # Not published to the host by default; only the api service needs it on the
    # internal network. Uncomment to inspect with psql from the host.
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crimson} -d ${POSTGRES_DB:-crimson}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  anime-api:
    image: crimson-backend:1.0
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY:?set TMDB_API_KEY in the environment or an .env file}
      # Point the pool at the bundled postgres service (or override with a full
      # DATABASE_URL to use a managed/external database in production).
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crimson}:${POSTGRES_PASSWORD:-crimson}@postgres:5432/${POSTGRES_DB:-crimson}
      # Stable, shared secret for the signed stream proxies (PlayIMDb/AnimeSuge).
      # MUST be set (and identical on every replica) or proxied playback 403s
      # across restarts/replicas. Generate one: `openssl rand -hex 32`.
      - PROXY_SECRET=${PROXY_SECRET:?set PROXY_SECRET (e.g. openssl rand -hex 32)}
      # Only one replica should own the periodic Fribb resync.
      - RUN_DB_SYNC=true
      # Optional: comma-separated CORS origins (defaults to the built-in list).
      # - ALLOWED_ORIGINS=https://crimsonhaven.to,https://www.crimsonhaven.to
      # Optional public /changelog from this repo's GitHub Releases. Must be listed
      # here to reach the container; unset => /changelog returns 503. Read-only
      # token (fine-grained PAT with Contents:read, or classic repo scope).
      # - GITHUB_TOKEN=
      # - GITHUB_REPO=crimsonhaven-to/crimson-backend
      # Optional Jellyfin source (see .env.example).
      # - JELLYFIN_URL=
      # - JELLYFIN_USERNAME=
      # - JELLYFIN_PASSWORD=
      # Optional ShowBox/Febbox direct-file source (see .env.example). Must be
      # listed here to reach the container — disables itself when unset.
      # - FEBBOX_UI_TOKEN=
      # - FEBBOX_REGION=

    # Container-level health is also defined in the Dockerfile; declared here too
    # so `docker compose` reports it without relying on the image default.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

    # Honoured by plain `docker compose`; Swarm uses deploy.restart_policy below.
    restart: unless-stopped

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      update_config:
        parallelism: 1
      resources:
        limits:
          cpus: "1.50"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  crimson-pgdata:   # PostgreSQL data directory (named volume)
