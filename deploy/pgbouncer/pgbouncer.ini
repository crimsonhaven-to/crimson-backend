;; Crimsonhaven PgBouncer — transaction-pooling connection multiplexer.
;; IDENTICAL on all three database hosts. One PgBouncer runs co-located on each
;; Patroni host, fronting THAT host's local PostgreSQL on 127.0.0.1:5432 and
;; listening on :6432. The app's multi-host DATABASE_URL (with
;; ?target_session_attrs=read-write) connects through whichever bouncer fronts the
;; current leader, so failover is followed automatically with no VIP — exactly
;; like the direct Patroni setup, just one hop earlier.

[databases]
;; The application database. host=127.0.0.1 means "the PostgreSQL on THIS host"
;; (the co-located Patroni node), so a bouncer always fronts its own local node
;; and can never accidentally point at a different host. Clients connect to the
;; virtual db name "crimson"; it maps to the real "crimson" database.
crimson = host=127.0.0.1 port=5432 dbname=crimson

[pgbouncer]
;; --- where it listens (reached by the Swarm app nodes, like Postgres' 5432) ---
listen_addr = 0.0.0.0
listen_port = 6432

;; Run in the foreground and log to stderr so Docker supervises + captures it.
;; Empty values override any packaged defaults (the Alpine package otherwise
;; points logfile at /var/log/pgbouncer, which the unprivileged user can't write).
logfile =
pidfile =

;; --- authentication ---
;; scram-sha-256 matches the cluster's password_encryption (see patroni.yml). The
;; auth_file holds the crimson login secret; PgBouncer uses it BOTH to verify the
;; incoming app client and to log in to PostgreSQL. See userlist.txt(.example) and
;; README §5 for what to put there.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

;; --- the whole point: transaction pooling ---
;; A real PostgreSQL connection is lent to a client only for the duration of ONE
;; transaction, then returned to the pool. This decouples "how many app clients
;; connect" (max_client_conn) from "how many real Postgres backends exist"
;; (default_pool_size) — so the API tier scales without multiplying Postgres
;; connections. Safe for this app: it keeps NO session-level state across
;; transactions (no LISTEN/NOTIFY, no SET SESSION, no session-level advisory
;; locks, no WITH HOLD cursors); its only advisory lock is transaction-scoped.
;; Requires app-side prepared statements OFF — already handled by
;; DB_PREPARE_THRESHOLD defaulting to disabled in db_pool.py.
pool_mode = transaction

;; Accept many app-side clients — these are cheap (just sockets to PgBouncer).
max_client_conn = 1000

;; Real PostgreSQL backends per (user, database). Only the LEADER's bouncer ever
;; carries traffic (the standbys' bouncers sit idle until a failover), so the
;; primary sees at most ~default_pool_size + reserve_pool_size connections for the
;; WHOLE API tier — a stable ~30, no matter how many api replicas you run. If you
;; ever see clients waiting (README §12: SHOW POOLS -> cl_waiting > 0), raise this.
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

;; Hard ceiling on server connections from THIS bouncer to its Postgres — a safety
;; rail so the pool can never climb toward Postgres' max_connections (100).
max_db_connections = 50

;; Recycle server connections so a failed-over old primary's stale links don't
;; linger, and verify a pooled server is still alive before handing it out.
server_lifetime = 600
server_idle_timeout = 120
server_check_query = select 1

;; psycopg/libpq may send startup parameters PgBouncer doesn't track; ignore them
;; rather than refusing the connection.
ignore_startup_parameters = extra_float_digits

;; --- admin / observability (connect: psql -p 6432 -U crimson pgbouncer) ---
admin_users = crimson
stats_users = crimson

;; Quiet in normal operation; flip log_connections=1 temporarily to debug auth.
log_connections = 0
log_disconnections = 0
