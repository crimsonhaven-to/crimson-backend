# pgBackRest configuration, mounted into the Patroni container at
# /etc/pgbackrest/pgbackrest.conf. It handles WAL archiving (the archive_command
# in patroni.yml calls it) and full/incremental backups with point-in-time
# recovery.
#
# IMPORTANT: replication is NOT a backup. A bad DELETE/DROP propagates to every
# standby instantly; only these backups can take you back to the moment before
# it. Keep the repo OFF the database hosts (S3-compatible object storage below)
# so a total site loss doesn't take the backups with it.

[global]
# --- Local repo (default; lives under PGBACKREST_REPO from .env) -------------
repo1-path=/var/lib/pgbackrest
# keep the last 4 full backups (pgBackRest .conf does NOT allow trailing inline
# comments — the value must stand alone on its own line)
repo1-retention-full=4
repo1-bundle=y
compress-type=zst
start-fast=y
# Cap how much WAL may queue locally if archiving ever stalls, so a wedged
# archive command can't fill the disk and take Postgres down with it.
archive-push-queue-max=2GiB

# --- Off-site repo (RECOMMENDED) --------------------------------------------
# Replace the three repo1-path/retention lines above with an S3-compatible
# target (Backblaze B2, Wasabi, AWS S3, MinIO, ...). Example:
#
# repo1-type=s3
# repo1-path=/crimson
# repo1-s3-bucket=crimson-pg-backups
# repo1-s3-endpoint=s3.us-west-002.backblazeb2.com
# repo1-s3-region=us-west-002
# repo1-s3-key=<access-key-id>
# repo1-s3-key-secret=<secret-access-key>
# repo1-retention-full=4

[crimson]
# Must match data_dir/port in patroni.yml.
pg1-path=/var/lib/postgresql/data/pgroot
pg1-port=5432
# Connect locally as the postgres superuser over the Unix socket. This relies on
# the `local all postgres peer` pg_hba rule (see patroni.yml) so no password is
# needed — the container already runs as the postgres OS user.
pg1-user=postgres
pg1-socket-path=/var/run/postgresql
