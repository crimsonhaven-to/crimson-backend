# Crimsonhaven PostgreSQL HA stack — run ONE copy of this on EACH of the three
# database hosts. Everything host-specific lives in a per-host .env file
# (copy .env.example -> .env on each host and edit it).
#
#   docker compose build           # build the Patroni image (first time only)
#   docker compose up -d etcd      # bring up etcd first, on ALL three hosts
#   docker compose up -d patroni   # then Patroni, on ALL three hosts
#
# Host networking is used so etcd peers and Patroni reach each other across hosts
# by their plain LAN IPs, with no Docker overlay to coordinate. Linux hosts only.

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    network_mode: host
    restart: unless-stopped
    environment:
      ETCD_NAME: ${ETCD_NAME}
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://${HOST_IP}:2380
      ETCD_ADVERTISE_CLIENT_URLS: http://${HOST_IP}:2379
      ETCD_INITIAL_CLUSTER: ${ETCD_INITIAL_CLUSTER}
      ETCD_INITIAL_CLUSTER_STATE: ${ETCD_INITIAL_CLUSTER_STATE:-new}
      ETCD_INITIAL_CLUSTER_TOKEN: crimson-etcd
    volumes:
      - etcd-data:/etcd-data

  patroni:
    build:
      context: .
      dockerfile: Dockerfile.patroni
    image: crimson-patroni:17
    network_mode: host
    restart: unless-stopped
    depends_on:
      - etcd
    environment:
      # --- identity / addresses (per host) ---
      PATRONI_NAME: ${PATRONI_NAME}
      PATRONI_SCOPE: ${PATRONI_SCOPE:-crimson-cluster}
      PATRONI_NAMESPACE: /crimson
      PATRONI_ETCD3_HOSTS: ${ETCD_CLIENT_HOSTS}
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: ${HOST_IP}:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: ${HOST_IP}:5432
      # --- secrets (same on all hosts) ---
      PATRONI_RESTAPI_USERNAME: ${PATRONI_RESTAPI_USERNAME:-admin}
      PATRONI_RESTAPI_PASSWORD: ${PATRONI_RESTAPI_PASSWORD:?set PATRONI_RESTAPI_PASSWORD}
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD:?set SUPERUSER_PASSWORD}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:?set REPLICATION_PASSWORD}
      # --- consumed by init-app-db.sh (post_init) ---
      CRIMSON_APP_USER: ${CRIMSON_APP_USER:-crimson}
      CRIMSON_APP_PASSWORD: ${CRIMSON_APP_PASSWORD:?set CRIMSON_APP_PASSWORD}
      CRIMSON_APP_DB: ${CRIMSON_APP_DB:-crimson}
    volumes:
      # Point PGDATA_DIR / PGBACKREST_REPO at your RAID1 mount (see .env).
      - ${PGDATA_DIR:-/srv/crimson-pgdata}:/var/lib/postgresql/data
      - ${PGBACKREST_REPO:-/srv/crimson-pgbackrest}:/var/lib/pgbackrest
      - ./patroni.yml:/etc/patroni/patroni.yml:ro
      - ./init-app-db.sh:/etc/patroni/init-app-db.sh:ro
      - ./pgbackrest/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro

volumes:
  etcd-data:
