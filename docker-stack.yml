# Docker Swarm stack for the Crimsonhaven backend (API).
#
# Deploy:
#   TMDB_API_KEY=... PROXY_SECRET=$(openssl rand -hex 32) \
#   DATABASE_URL=postgresql://user:pass@db-host:5432/crimson \
#   docker stack deploy -c docker-stack.yml crimson-api
#
# Unlike docker-compose.yml (which bundles a postgres container for local/dev),
# this stack expects an EXTERNAL managed PostgreSQL via DATABASE_URL — the IaC
# doctrine goal: every replica is identical and stateless, pointing at one DB.
#
# For a redundant, self-hosted PostgreSQL (Patroni HA cluster) plus the dev->prod
# data migration, see deploy/postgres-ha/README.md. With that cluster, point
# DATABASE_URL at all three DB hosts and let psycopg find the primary itself:
#   DATABASE_URL=postgresql://crimson:PASS@db-1,db-2,db-3:5432/crimson?target_session_attrs=read-write
#
# Two services, one image (see "Why two services" at the bottom):
#   api       — N stateless serving replicas (RUN_DB_SYNC=false), publishes :8000
#   api-sync  — exactly ONE replica that owns the Fribb resync (RUN_DB_SYNC=true),
#               no published port (it doesn't serve ingress traffic)
#
# Production fronting: keep this BEHIND your TLS-terminating reverse proxy. The
# app emits absolute iframe URLs from X-Forwarded-Proto/Host, so it must only be
# reachable via that proxy — do NOT expose the published port below straight to
# the internet (an attacker could spoof X-Forwarded-Host). Either remove the
# `ports:` block and attach your proxy to `crimson_net`, or bind-publish to
# loopback and have the host proxy forward to it.
version: "3.8"

services:
  # --- Serving replicas ------------------------------------------------------
  # Stateless, horizontally scalable. They do NOT run the Fribb resync; they just
  # read the mapping tables that api-sync keeps fresh in the shared DB. Scale via
  # `replicas` below. Schema init is concurrency-safe (db_pool.lock_schema_init),
  # so multiple replicas can boot simultaneously without racing on DDL.
  api:
    image: ${CRIMSON_API_IMAGE:-ghcr.io/crimsonhaven-to/crimson-backend:latest}

    environment:
      - TMDB_API_KEY=${TMDB_API_KEY:?set TMDB_API_KEY}
      - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL to the external PostgreSQL}
      # Stable + identical across replicas, or signed-proxy playback 403s after a
      # restart / on another replica. Generate: openssl rand -hex 32
      - PROXY_SECRET=${PROXY_SECRET:?set PROXY_SECRET}
      # Lock CORS down to the real frontend origins in production.
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://crimsonhaven.to,https://www.crimsonhaven.to}
      # Serving replicas never run the resync — api-sync owns it.
      - RUN_DB_SYNC=false
      # Ko-fi webhook + Jellyfin source live on the serving service (it handles
      # the ingress POST /kofi/webhook + playback requests), not on api-sync.
      # These are optional (`:-` => empty when unset disables the feature), but
      # are supplied via crimson.env on the manager to match production.
      - KOFI_VERIFICATION_TOKEN=${KOFI_VERIFICATION_TOKEN:-}
      # Public /changelog — cached view of this repo's GitHub Releases. Lives on
      # the serving service (it answers the ingress GET /changelog), not api-sync.
      # Supplied via crimson.env on the manager; unset => /changelog returns 503.
      # The token only needs read access (fine-grained PAT with Contents:read).
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-crimsonhaven-to/crimson-backend}
      - JELLYFIN_URL=${JELLYFIN_URL:-}
      - JELLYFIN_USERNAME=${JELLYFIN_USERNAME:-}
      - JELLYFIN_PASSWORD=${JELLYFIN_PASSWORD:-}
      # ShowBox/Febbox direct-file source. Like Jellyfin it disables itself when
      # unset (no FEBBOX_UI_TOKEN => is_configured() False => the source never
      # surfaces). Supplied via crimson.env on the manager. Optional region cookie.
      - FEBBOX_UI_TOKEN=${FEBBOX_UI_TOKEN:-}
      - FEBBOX_REGION=${FEBBOX_REGION:-}
      # Login wall (email+password) — lives on the serving service. Supplied via
      # crimson.env on the manager. An empty SIGNUP_INVITE_CODE closes signups
      # (every register 403s), so set it. SMTP powers verification/reset email.
      - REQUIRE_LOGIN=${REQUIRE_LOGIN:-true}
      # Gates BOTH email and mnemonic signup — mnemonic /auth/register is
      # invite-gated too now, so a fresh client-side keypair can't bypass it.
      - SIGNUP_INVITE_CODE=${SIGNUP_INVITE_CODE:-}
      # Seed admin accounts for the /admin dashboard (comma-separated emails).
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-https://crimsonhaven.to}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURITY=${SMTP_SECURITY:-starttls}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-CrimsonHaven}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      # --- Server-side video cache (optional) ----------------------------------
      # The serving replicas mint cache tickets and claim pending rows, but they do
      # NOT run the ffmpeg download loop — that lives in the dedicated cache-worker
      # service below, so a long remux isn't killed every time `api` rolls. Keep
      # this false here; only cache-worker sets it true.
      - RUN_CACHE_WORKER=false
      # Downloader tuning for cache_engine. All have sane defaults baked in, so
      # you only need these to override them. The NAS itself is mounted via the
      # `crimson_cache` volume below — NOT through these env vars. Uncomment to tune.
      # - CACHE_INTERNAL_BASE=http://127.0.0.1:8000  # how ffmpeg reaches our own proxies (loopback)
      # - CACHE_MAX_CONCURRENT=1                      # simultaneous downloads per replica
      # - CACHE_DOWNLOAD_TIMEOUT=3600                 # per-episode ffmpeg timeout (seconds)
      # - CACHE_MIN_FREE_BYTES=2147483648             # skip a download below this much free space (2 GiB)
      # - CACHE_QUEUE_MAX=200                         # queued downloads before new ones are dropped

    # --- NAS cache mount (optional) ------------------------------------------
    # The serving replicas BOTH trigger downloads and serve /cache_proxy, so the
    # cache must be mounted on every node that runs `api`. (api-sync serves no
    # ingress traffic, so it does NOT need the mount.) Register the in-container
    # path — /crimson/cache — in Admin → Cache. Uncomment this together with the
    # `crimson_cache` volume definition at the bottom of the file.
    volumes:
      - crimson_cache1:/crimson/cache1
      - crimson_cache2:/crimson/cache2

    # Front this with your reverse proxy. Remove if you attach the proxy directly
    # to crimson_net instead of publishing a host port. Only THIS service may
    # publish :8000 — two services can't share an ingress port.
    ports:
      - target: 8000
        published: 8000
        protocol: tcp
        mode: ingress

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Serving replicas skip the resync, so they bind :8000 within seconds.
      start_period: 60s

    stop_grace_period: 20s

    deploy:
      mode: replicated
      replicas: 3
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      resources:
        limits:
          cpus: "1.50"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

    networks:
      - crimson_net

  # --- Sync owner (exactly one) ----------------------------------------------
  # Owns the periodic Fribb resync that rebuilds the mapping tables wholesale.
  # MUST stay at replicas: 1 — two of these would download + rebuild in lockstep,
  # wasting bandwidth and contending on the shared DB. No published port: it does
  # not serve ingress traffic, it only keeps the DB fresh for the api replicas.
  api-sync:
    image: ${CRIMSON_API_IMAGE:-ghcr.io/crimsonhaven-to/crimson-backend:latest}

    environment:
      - TMDB_API_KEY=${TMDB_API_KEY:?set TMDB_API_KEY}
      - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL to the external PostgreSQL}
      - PROXY_SECRET=${PROXY_SECRET:?set PROXY_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://crimsonhaven.to,https://www.crimsonhaven.to}
      # The one process that runs the Fribb resync.
      - RUN_DB_SYNC=true
      # api-sync serves no ingress and has no NAS mount; it never downloads.
      - RUN_CACHE_WORKER=false

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Uvicorn binds :8000 only AFTER lifespan startup finishes, and here that
      # includes the first-boot Fribb resync (download + wholesale rebuild), which
      # can take several minutes. Until it's done /health is connection-refused,
      # so the grace window must cover it or Swarm kills the container mid-sync
      # and it loops forever. The resync re-runs on every boot of this service.
      start_period: 600s

    stop_grace_period: 20s

    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        # stop-first: never run two syncers at once (start-first would briefly
        # overlap the old + new container, both doing the wholesale resync).
        order: stop-first
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first
      resources:
        limits:
          cpus: "1.50"
          # The resync loads the full Fribb mapping into memory. If this container
          # gets OOM-killed (task error "non-zero exit (137)") during the rebuild,
          # raise this limit (e.g. 1024M / 1536M).
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

    networks:
      - crimson_net

  # --- Cache download worker (optional, exactly one) -------------------------
  # The ffmpeg remux job, moved off the serving tier. Same image, same default CMD
  # (uvicorn) as `api` — so its OWN loopback (CACHE_INTERNAL_BASE=127.0.0.1:8000)
  # serves the signed stream proxies ffmpeg pulls through, exactly like a serving
  # replica would; nothing about signing/CORS changes. It just sets
  # RUN_CACHE_WORKER=true (runs the background download loop) and publishes no port
  # (serves no ingress). The api replicas mint cache tickets and write `pending`
  # rows on /cache/confirm; this worker polls Postgres for them and runs ffmpeg —
  # so the job is DB-durable and a download is no longer killed every time `api`
  # rolls. MUST stay replicas: 1 (CACHE_MAX_CONCURRENT bounds parallelism within
  # it); a second instance is harmless though — the DB claim (begin_download)
  # dedupes. Needs the NAS mount (it writes the files) and the same source env the
  # proxies it replays through require (e.g. Jellyfin token injection).
  cache-worker:
    image: ${CRIMSON_API_IMAGE:-ghcr.io/crimsonhaven-to/crimson-backend:latest}

    environment:
      - TMDB_API_KEY=${TMDB_API_KEY:?set TMDB_API_KEY}
      - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL to the external PostgreSQL}
      # Same secret as api, or the proxy URLs ffmpeg pulls won't verify their sig.
      - PROXY_SECRET=${PROXY_SECRET:?set PROXY_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://crimsonhaven.to,https://www.crimsonhaven.to}
      # Never the resync owner; always the download worker.
      - RUN_DB_SYNC=false
      - RUN_CACHE_WORKER=true
      # Source env the replayed proxies may need on this worker's own loopback
      # (a cached Jellyfin/ShowBox stream is pulled back through these proxies).
      - JELLYFIN_URL=${JELLYFIN_URL:-}
      - JELLYFIN_USERNAME=${JELLYFIN_USERNAME:-}
      - JELLYFIN_PASSWORD=${JELLYFIN_PASSWORD:-}
      - FEBBOX_UI_TOKEN=${FEBBOX_UI_TOKEN:-}
      - FEBBOX_REGION=${FEBBOX_REGION:-}
      # Downloader tuning (same knobs as api's commented block). Defaults are baked
      # in; uncomment to override. CACHE_INTERNAL_BASE stays loopback — this worker
      # runs its own uvicorn, so the proxies are right here on 127.0.0.1:8000.
      # - CACHE_MAX_CONCURRENT=1     # simultaneous ffmpeg remuxes
      # - CACHE_POLL_INTERVAL=10     # seconds between DB polls for new pending rows
      # - CACHE_DOWNLOAD_TIMEOUT=3600
      # - CACHE_MIN_FREE_BYTES=2147483648
      # - CACHE_QUEUE_MAX=200

    # Writes the cached files — needs the same NAS mount the serving replicas use
    # to read them back via /cache_proxy. Same volumes, so register the same
    # in-container paths (/crimson/cache1, /crimson/cache2) in Admin → Cache.
    volumes:
      - crimson_cache1:/crimson/cache1
      - crimson_cache2:/crimson/cache2

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      # No resync on this service, so uvicorn binds within seconds like `api`.
      start_period: 60s

    # Give an in-flight remux time to finish on graceful shutdown rather than being
    # killed mid-download (which would just mark the row failed for a later retry).
    stop_grace_period: 120s

    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        # stop-first: never run two workers at once. The old one drains its current
        # remux within stop_grace_period and exits BEFORE the new one starts, so the
        # new worker's startup requeue (downloading -> pending) only ever sees
        # genuinely-orphaned rows — it can't grab a row the old worker is still
        # downloading. A brief no-worker gap is fine (this serves no ingress; pending
        # rows just wait in Postgres).
        order: stop-first
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first
      resources:
        limits:
          # ffmpeg is the workload here (mostly -c copy remux; the audio-only
          # re-encode fallback is the heaviest path), so give it more headroom than
          # a serving replica.
          cpus: "2.00"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

    networks:
      - crimson_net

  # --- Discord invite bot (optional, exactly one) ----------------------------
  # Same image as the API but runs the gateway bot (python -m discord_bot) rather
  # than uvicorn. It only needs the DB (it mints single-use invite tokens into the
  # same PostgreSQL the api reads at /auth/email/register), so it publishes no
  # port. MUST stay at replicas: 1 — a second gateway login with the same token
  # fights the first (and would double-mint). With DISCORD_BOT_TOKEN unset the
  # process just logs "disabled" and idles, so it's harmless to leave deployed.
  discord-bot:
    image: ${CRIMSON_API_IMAGE:-ghcr.io/crimsonhaven-to/crimson-backend:latest}
    command: ["python", "-m", "discord_bot"]

    # Disable the image's baked-in HEALTHCHECK (it probes http://127.0.0.1:8000/
    # health). This service runs the gateway bot, NOT uvicorn, so nothing listens
    # on :8000 — the inherited check would fail forever, Swarm would mark the task
    # unhealthy and keep restarting it (stuck "starting" -> error loop). ["NONE"]
    # turns the healthcheck off so the bot is judged by its process staying up.
    healthcheck:
      test: ["NONE"]

    environment:
      - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL to the external PostgreSQL}
      # Supplied via crimson.env on the manager. Empty token => bot stays off.
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_OWNER_ID=${DISCORD_OWNER_ID:-}
      - DISCORD_COMMAND_PREFIX=${DISCORD_COMMAND_PREFIX:-!}
      # For the "register at <url>" hint shown next to minted codes.
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-https://crimsonhaven.to}

    stop_grace_period: 20s

    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        # Never run two gateway connections at once (start-first would overlap).
        order: stop-first
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

    networks:
      - crimson_net

  # --- Old-image janitor (global, one-shot per release) ----------------------
  # Swarm keeps the previously-deployed image on every node so it can roll back
  # instantly, and it never cleans the one before that — so each release leaves
  # another full backend image (~hundreds of MB) stranded on disk forever. Over
  # dozens of releases that grows into tens of GB of dead images per node.
  #
  # This service reclaims it WITHOUT breaking rollback. It is `mode: global`, so
  # Swarm runs exactly one task per node — including nodes that don't run `api`,
  # which may still hold images from past schedulings. On each node it:
  #   1. lists the locally-present release tags (vX.Y.Z) of our image,
  #   2. version-sorts them and KEEPS the newest 3 (this release + 2 to roll back
  #      to — well past Swarm's single-step rollback target),
  #   3. `docker image rm` (NOT `-f`) every older one. Un-forced removal is the
  #      safety net: Docker refuses to delete an image any container — running OR
  #      a draining/old rollback task — still references, so "not used anymore"
  #      is enforced by the daemon, not guessed by us. Refusals are logged, not
  #      fatal, and that image is simply retried on the next release.
  # `:dev`, `:dev-<sha>`, `:latest` and `:buildcache` never match the vX.Y.Z
  # filter, so they're untouched. The image stays in GHCR regardless, so even a
  # pruned release can be re-pulled if you ever force a deeper rollback.
  #
  # It runs once and exits (restart_policy condition: none) — a batch janitor,
  # not a daemon, so a completed 0/0 task count is expected and healthy. Because
  # PRUNE_RELEASE is pinned to the new image ref, the service spec changes every
  # release, which is what makes `docker stack deploy` re-schedule this one-shot
  # task across all nodes. It mounts the host Docker socket (root-equivalent on
  # that node) — that's required to talk to the daemon and is standard for a
  # cluster maintenance task; it touches only our own repo's old tags.
  pruner:
    image: docker:28-cli
    # POSIX sh on docker:cli. Self-contained: each node derives its own keep-set
    # from what it actually has on disk, so no version list needs to be passed in.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        IMAGE="ghcr.io/crimsonhaven-to/crimson-backend"
        KEEP=3
        echo "[pruner] $(hostname): keeping newest ${KEEP} release tags of ${IMAGE}"
        # Numeric key sort (newest first) instead of `sort -V`, which busybox
        # (docker:cli is Alpine-based) doesn't reliably ship — strip the leading
        # v, sort major/minor/patch numerically so v1.10.0 outranks v1.9.0, re-add.
        tags="$(docker image ls --format '{{.Tag}}' "$IMAGE" 2>/dev/null \
                  | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                  | sed 's/^v//' | sort -t. -k1,1nr -k2,2nr -k3,3nr \
                  | sed 's/^/v/' || true)"
        if [ -z "$tags" ]; then
          echo "[pruner] no vX.Y.Z release images present — nothing to do"; exit 0
        fi
        echo "[pruner] present (newest first):"; echo "$tags" | sed 's/^/[pruner]   /'
        old="$(echo "$tags" | tail -n +$((KEEP + 1)))"
        if [ -z "$old" ]; then
          echo "[pruner] <= ${KEEP} release images, nothing to remove"; exit 0
        fi
        for t in $old; do
          # Un-forced: the daemon refuses if any container still references it,
          # which protects the live + draining rollback targets automatically.
          if docker image rm "${IMAGE}:${t}" >/dev/null 2>&1; then
            echo "[pruner] removed   ${IMAGE}:${t}"
          else
            echo "[pruner] kept (in use / gone) ${IMAGE}:${t}"
          fi
        done
        # Sweep dangling (untagged) layers left behind when a tag was overwritten;
        # without -a this only touches unreferenced images, never tagged ones.
        docker image prune -f >/dev/null 2>&1 || true
        echo "[pruner] done"

    environment:
      # Pinned to the rolled-out image ref so the spec — and thus the one-shot
      # task — changes on every release, re-triggering the prune fleet-wide.
      - PRUNE_RELEASE=${CRIMSON_API_IMAGE:-ghcr.io/crimsonhaven-to/crimson-backend:latest}

    # Talk to the node's own daemon to list/remove its local images.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    # Batch job, not a server — it never binds a port, so no healthcheck.
    healthcheck:
      test: ["NONE"]

    deploy:
      mode: global
      restart_policy:
        # Run once per (re)deploy and stop. Don't relaunch on exit — a failed
        # pass is harmless and simply retried at the next release.
        condition: none
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          cpus: "0.01"
          memory: 16M

networks:
  crimson_net:
    driver: overlay
    attachable: true

# --- Optional: NAS volume for the server-side video cache --------------------
# Windows / Samba shares speak SMB (the Linux mount type is "cifs"); a Unix/Linux
# NAS exporting NFS uses "nfs" instead (see the NFS variant below). Swarm mounts
# the volume on every node that runs a task referencing it, so you do NOT have to
# hand-mount the share on each of the 3 hosts — define it once here and uncomment
# the `volumes:` block under the `api` service above.
#
#
#   NAS_IP=192.168.1.10 NAS_SHARE=crimson-cache \
#   NAS_USER=crimson NAS_PASSWORD='super-secret' \
#   TMDB_API_KEY=... PROXY_SECRET=... DATABASE_URL=... \
#   docker stack deploy -c docker-stack.yml crimson-api
#
volumes:
  crimson_cache1:
    driver: local
    driver_opts:
      type: cifs
      # // <host-or-ip>/<share> — forward slashes even for a Windows share.
      device: "//${NAS_IP}/${NAS_SHARE1}"
      # uid/gid 10001 == the image's non-root `appuser`, so ffmpeg may write;
      # vers=3.0 suits modern Windows/Samba (drop to 2.1 for very old servers).
      o: "username=${NAS_USER},password=${NAS_PASSWORD},vers=3.0,uid=10001,gid=10001,file_mode=0664,dir_mode=0775"

  crimson_cache2:
    driver: local
    driver_opts:
      type: cifs
      # // <host-or-ip>/<share> — forward slashes even for a Windows share.
      device: "//${NAS_IP}/${NAS_SHARE2}"
      # uid/gid 10001 == the image's non-root `appuser`, so ffmpeg may write;
      # vers=3.0 suits modern Windows/Samba (drop to 2.1 for very old servers).
      o: "username=${NAS_USER},password=${NAS_PASSWORD},vers=3.0,uid=10001,gid=10001,file_mode=0664,dir_mode=0775"
#
#   # NFS variant (Unix/Linux NAS) — use THIS block instead of the cifs one above:
#   # crimson_cache:
#   #   driver: local
#   #   driver_opts:
#   #     type: nfs
#   #     o: "addr=${NAS_IP},nfsvers=4,rw,hard,timeo=600"
#   #     device: ":/export/crimson-cache"

# --- Why two services --------------------------------------------------------
# Only ONE process may run the Fribb resync, but the serving tier must scale. A
# single service can't do both: every replica of a service shares the same env,
# so you can't have one with RUN_DB_SYNC=true and the rest false. Hence the split
# — `api` (replicas: N, RUN_DB_SYNC=false) and `api-sync` (replicas: 1,
# RUN_DB_SYNC=true). Both run from the same image and both run the cheap
# expired-session purge on their own schedule; only api-sync runs the resync.
#
# To scale the serving tier, change `replicas` under `api`. Mind the DB
# connection ceiling: each replica opens up to DB_POOL_MAX (default 10)
# connections to the Patroni leader, plus api-sync's pool, plus replication/
# Patroni overhead — so direct-to-Postgres you top out at ~8 api replicas before
# hitting max_connections (default 100).
#
# To scale past that, run the co-located PgBouncer pooler (deploy/pgbouncer): it
