# Docker Swarm stack for the Crimsonhaven backend (API).
#
# Deploy:
#   TMDB_API_KEY=... PROXY_SECRET=$(openssl rand -hex 32) \
#   DATABASE_URL=postgresql://user:pass@db-host:5432/crimson \
#   docker stack deploy -c docker-stack.yml crimson-api
#
# Unlike docker-compose.yml (which bundles a postgres container for local/dev),
# this stack expects an EXTERNAL managed PostgreSQL via DATABASE_URL — the IaC
# doctrine goal: every replica is identical and stateless, pointing at one DB.
#
# For a redundant, self-hosted PostgreSQL (Patroni HA cluster) plus the dev->prod
# data migration, see deploy/postgres-ha/README.md. With that cluster, point
# DATABASE_URL at all three DB hosts and let psycopg find the primary itself:
#   DATABASE_URL=postgresql://crimson:PASS@db-1,db-2,db-3:5432/crimson?target_session_attrs=read-write
#
# Two services, one image (see "Why two services" at the bottom):
#   api       — N stateless serving replicas (RUN_DB_SYNC=false), publishes :8000
#   api-sync  — exactly ONE replica that owns the Fribb resync (RUN_DB_SYNC=true),
#               no published port (it doesn't serve ingress traffic)
#
# Production fronting: keep this BEHIND your TLS-terminating reverse proxy. The
# app emits absolute iframe URLs from X-Forwarded-Proto/Host, so it must only be
# reachable via that proxy — do NOT expose the published port below straight to
# the internet (an attacker could spoof X-Forwarded-Host). Either remove the
# `ports:` block and attach your proxy to `crimson_net`, or bind-publish to
# loopback and have the host proxy forward to it.
version: "3.8"

services:
  # --- Serving replicas ------------------------------------------------------
  # Stateless, horizontally scalable. They do NOT run the Fribb resync; they just
  # read the mapping tables that api-sync keeps fresh in the shared DB. Scale via
  # `replicas` below. Schema init is concurrency-safe (db_pool.lock_schema_init),
  # so multiple replicas can boot simultaneously without racing on DDL.
  api:
    image: ${CRIMSON_API_IMAGE:-ghcr.io/crimsonhaven-to/crimson-backend:latest}

    environment:
      - TMDB_API_KEY=${TMDB_API_KEY:?set TMDB_API_KEY}
      - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL to the external PostgreSQL}
      # Stable + identical across replicas, or signed-proxy playback 403s after a
      # restart / on another replica. Generate: openssl rand -hex 32
      - PROXY_SECRET=${PROXY_SECRET:?set PROXY_SECRET}
      # Lock CORS down to the real frontend origins in production.
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://crimsonhaven.to,https://www.crimsonhaven.to}
      # Serving replicas never run the resync — api-sync owns it.
      - RUN_DB_SYNC=false
      # Ko-fi webhook + Jellyfin source live on the serving service (it handles
      # the ingress POST /kofi/webhook + playback requests), not on api-sync.
      # These are optional (`:-` => empty when unset disables the feature), but
      # are supplied via crimson.env on the manager to match production.
      - KOFI_VERIFICATION_TOKEN=${KOFI_VERIFICATION_TOKEN:-}
      - JELLYFIN_URL=${JELLYFIN_URL:-}
      - JELLYFIN_USERNAME=${JELLYFIN_USERNAME:-}
      - JELLYFIN_PASSWORD=${JELLYFIN_PASSWORD:-}
      # Login wall (email+password) — lives on the serving service. Supplied via
      # crimson.env on the manager. An empty SIGNUP_INVITE_CODE closes signups
      # (every register 403s), so set it. SMTP powers verification/reset email.
      - REQUIRE_LOGIN=${REQUIRE_LOGIN:-true}
      # Gates BOTH email and mnemonic signup — mnemonic /auth/register is
      # invite-gated too now, so a fresh client-side keypair can't bypass it.
      - SIGNUP_INVITE_CODE=${SIGNUP_INVITE_CODE:-}
      # Seed admin accounts for the /admin dashboard (comma-separated emails).
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-https://crimsonhaven.to}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURITY=${SMTP_SECURITY:-starttls}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-CrimsonHaven}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}

    # Front this with your reverse proxy. Remove if you attach the proxy directly
    # to crimson_net instead of publishing a host port. Only THIS service may
    # publish :8000 — two services can't share an ingress port.
    ports:
      - target: 8000
        published: 8000
        protocol: tcp
        mode: ingress

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Serving replicas skip the resync, so they bind :8000 within seconds.
      start_period: 60s

    stop_grace_period: 20s

    deploy:
      mode: replicated
      replicas: 3
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      resources:
        limits:
          cpus: "1.50"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

    networks:
      - crimson_net

  # --- Sync owner (exactly one) ----------------------------------------------
  # Owns the periodic Fribb resync that rebuilds the mapping tables wholesale.
  # MUST stay at replicas: 1 — two of these would download + rebuild in lockstep,
  # wasting bandwidth and contending on the shared DB. No published port: it does
  # not serve ingress traffic, it only keeps the DB fresh for the api replicas.
  api-sync:
    image: ${CRIMSON_API_IMAGE:-ghcr.io/crimsonhaven-to/crimson-backend:latest}

    environment:
      - TMDB_API_KEY=${TMDB_API_KEY:?set TMDB_API_KEY}
      - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL to the external PostgreSQL}
      - PROXY_SECRET=${PROXY_SECRET:?set PROXY_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://crimsonhaven.to,https://www.crimsonhaven.to}
      # The one process that runs the Fribb resync.
      - RUN_DB_SYNC=true

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Uvicorn binds :8000 only AFTER lifespan startup finishes, and here that
      # includes the first-boot Fribb resync (download + wholesale rebuild), which
      # can take several minutes. Until it's done /health is connection-refused,
      # so the grace window must cover it or Swarm kills the container mid-sync
      # and it loops forever. The resync re-runs on every boot of this service.
      start_period: 600s

    stop_grace_period: 20s

    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        # stop-first: never run two syncers at once (start-first would briefly
        # overlap the old + new container, both doing the wholesale resync).
        order: stop-first
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first
      resources:
        limits:
          cpus: "1.50"
          # The resync loads the full Fribb mapping into memory. If this container
          # gets OOM-killed (task error "non-zero exit (137)") during the rebuild,
          # raise this limit (e.g. 1024M / 1536M).
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

    networks:
      - crimson_net

  # --- Discord invite bot (optional, exactly one) ----------------------------
  # Same image as the API but runs the gateway bot (python -m discord_bot) rather
  # than uvicorn. It only needs the DB (it mints single-use invite tokens into the
  # same PostgreSQL the api reads at /auth/email/register), so it publishes no
  # port. MUST stay at replicas: 1 — a second gateway login with the same token
  # fights the first (and would double-mint). With DISCORD_BOT_TOKEN unset the
  # process just logs "disabled" and idles, so it's harmless to leave deployed.
  discord-bot:
    image: ${CRIMSON_API_IMAGE:-ghcr.io/crimsonhaven-to/crimson-backend:latest}
    command: ["python", "-m", "discord_bot"]

    # Disable the image's baked-in HEALTHCHECK (it probes http://127.0.0.1:8000/
    # health). This service runs the gateway bot, NOT uvicorn, so nothing listens
    # on :8000 — the inherited check would fail forever, Swarm would mark the task
    # unhealthy and keep restarting it (stuck "starting" -> error loop). ["NONE"]
    # turns the healthcheck off so the bot is judged by its process staying up.
    healthcheck:
      test: ["NONE"]

    environment:
      - DATABASE_URL=${DATABASE_URL:?set DATABASE_URL to the external PostgreSQL}
      # Supplied via crimson.env on the manager. Empty token => bot stays off.
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_OWNER_ID=${DISCORD_OWNER_ID:-}
      - DISCORD_COMMAND_PREFIX=${DISCORD_COMMAND_PREFIX:-!}
      # For the "register at <url>" hint shown next to minted codes.
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-https://crimsonhaven.to}

    stop_grace_period: 20s

    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        # Never run two gateway connections at once (start-first would overlap).
        order: stop-first
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

    networks:
      - crimson_net

networks:
  crimson_net:
    driver: overlay
    attachable: true

# --- Why two services --------------------------------------------------------
# Only ONE process may run the Fribb resync, but the serving tier must scale. A
# single service can't do both: every replica of a service shares the same env,
# so you can't have one with RUN_DB_SYNC=true and the rest false. Hence the split
# — `api` (replicas: N, RUN_DB_SYNC=false) and `api-sync` (replicas: 1,
# RUN_DB_SYNC=true). Both run from the same image and both run the cheap
# expired-session purge on their own schedule; only api-sync runs the resync.
#
# To scale the serving tier, change `replicas` under `api`. Mind the DB
# connection ceiling: each replica opens up to DB_POOL_MAX (default 10)
# connections to the Patroni leader, plus api-sync's pool, plus replication/
# Patroni overhead — so direct-to-Postgres you top out at ~8 api replicas before
# hitting max_connections (default 100).
#
# To scale past that, run the co-located PgBouncer pooler (deploy/pgbouncer): it
# multiplexes the whole API tier onto a small, fixed set of Postgres connections,
# so replica count stops driving connection count. After standing it up, just
# point DATABASE_URL at port 6432 instead of 5432 (same host list, same
# target_session_attrs=read-write). See deploy/pgbouncer/README.md.
