name: Build and Deploy

# Build the backend image and push it to the PRIVATE GitHub Container Registry
# (GHCR), then roll it out to the Docker Swarm.
#
#   * push to `dev`         -> build + push ghcr.io/.../crimson-backend:dev
#                              (and :dev-<sha>). No deploy.
#   * a published Release   -> build + push :<tag> and :latest, then deploy that
#                              immutable :<tag> to the swarm with a health-gated,
#                              auto-rolling update.
#
# The image is PRIVATE. Pull auth reaches the swarm nodes two ways:
#   - CI push uses the ephemeral GITHUB_TOKEN (packages: write).
#   - Runtime pulls use a durable `read:packages` login configured once on the
#     manager (crimsonswarm01); `docker stack deploy --with-registry-auth` ships
#     those credentials to every node so re-pulls survive reboots/reschedules.
#
# Runner: the single org-level self-hosted runner on the jumphost `server10`,
# which has Docker + buildx and passwordless SSH to the swarm managers.

on:
  push:
    branches:
      - dev
    # Doc-only commits shouldn't rebuild + redeploy the dev image.
    paths-ignore:
      - '**.md'
  release:
    types: [published]

# Never let two builds/deploys of the same ref run concurrently (a second
# release must wait, not race the rolling update). Releases are not cancelled.
concurrency:
  group: crimson-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/crimsonhaven-to/crimson-backend
  # The swarm manager the deploy is driven against (reachable from the runner).
  SWARM_MANAGER: crimsonswarm01

jobs:
  # Quality gate — MUST pass before anything is built or deployed. Runs the
  # correctness linter (ruff pyflakes) + the fixture-based unit tests (pure
  # parsing/crypto/signing logic; no network, no DB). Runs inside the exact prod
  # base image (python:3.14-slim) so "it imports/installs in CI" == "it imports
  # in the deployed container".
  gate:
    runs-on: [self-hosted]
    container: python:3.14-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dev + runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff — correctness rules)
        run: ruff check .

      - name: Type-check (mypy — informational, non-blocking)
        continue-on-error: true
        run: mypy . || true

      - name: Unit tests (pytest)
        run: pytest

  build:
    needs: gate
    runs-on: [self-hosted]
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      deploy: ${{ steps.meta.outputs.deploy }}
      # The exact, immutable tag to deploy (vX.Y.Z on release, dev-<sha> on dev).
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VER="${{ github.event.release.tag_name }}"
            echo "version=${VER}"  >> "$GITHUB_OUTPUT"
            echo "deploy=true"      >> "$GITHUB_OUTPUT"
            echo "tags=${IMAGE}:${VER},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
            echo "image_tag=${VER}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="$(git rev-parse --short HEAD)"
            echo "version="         >> "$GITHUB_OUTPUT"
            echo "deploy=false"     >> "$GITHUB_OUTPUT"
            echo "tags=${IMAGE}:dev,${IMAGE}:dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            # Deploy the immutable per-commit tag, not the rolling :dev, so the
            # dev stack always rolls to exactly this build.
            echo "image_tag=dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (private)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Registry-backed layer cache keeps rebuilds fast across runner restarts.
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

  deploy:
    needs: build
    if: ${{ needs.build.outputs.deploy == 'true' }}
    runs-on: [self-hosted]
    steps:
      # Checkout at the release tag so we ship THIS release's stack definition.
      - name: Checkout release
        uses: actions/checkout@v4

      - name: Ship stack file to the manager
        run: |
          scp -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
            docker-stack.yml "${SWARM_MANAGER}:/home/raymond/crimson-deploy/docker-stack.yml"

      - name: Deploy to the swarm
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new "${SWARM_MANAGER}" \
            "/home/raymond/crimson-deploy/deploy.sh '${{ needs.build.outputs.version }}'"

  # Dev auto-deploy: a push to `dev` rolls the just-built dev-<sha> image onto the
  # crimson-dev stack. Unlike the prod deploy this ships NO stack file — the dev
  # docker-stack.yml lives only on the manager (~/dev-crimson-deploy/), bundling
  # its own Postgres; CI just triggers its deploy.sh.
  deploy-dev:
    needs: build
    if: ${{ github.event_name == 'push' }}
    runs-on: [self-hosted]
    steps:
      - name: Deploy to the dev swarm stack
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new "${SWARM_MANAGER}" \
            "/home/raymond/dev-crimson-deploy/deploy.sh '${{ needs.build.outputs.image_tag }}'"
